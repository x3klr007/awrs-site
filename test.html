<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 DHT11 Test Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #2d2d2d;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        button {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #0098ff;
        }
        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 20px;
        }
        .card {
            background-color: #3d3d3d;
            padding: 16px;
            border-radius: 8px;
        }
        .label {
            font-size: 12px;
            color: #aaaaaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .value {
            font-size: 28px;
            font-weight: bold;
        }
        .status {
            margin-top: 20px;
            font-size: 14px;
            color: #ff5555;
        }
        .connected {
            color: #55ff55;
        }
        #raw-log {
            margin-top: 20px;
            background: #111;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            color: #888;
            max-height: 80px;
            overflow-y: auto;
            text-align: left;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Sensor Test</h2>
        <button id="connectBtn">Connect to ESP32 (USB)</button>
        
        <div id="status" class="status">Disconnected</div>

        <div class="data-grid">
            <div class="card">
                <div class="label">Temperature</div>
                <div class="value"><span id="temp">--</span> °C</div>
            </div>
            <div class="card">
                <div class="label">Humidity</div>
                <div class="value"><span id="hum">--</span> %</div>
            </div>
        </div>

        <div id="raw-log">Raw JSON will appear here...</div>
    </div>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const statusEl = document.getElementById('status');
        const tempEl = document.getElementById('temp');
        const humEl = document.getElementById('hum');
        const logEl = document.getElementById('raw-log');

        let dataBuffer = "";

        connectBtn.addEventListener('click', async () => {
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                
                statusEl.textContent = "Connected via USB Serial!";
                statusEl.className = "status connected";
                connectBtn.style.display = 'none';

                const textDecoder = new TextDecoderStream();
                const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
                const reader = textDecoder.readable.getReader();

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    dataBuffer += value;

                    while (dataBuffer.includes('\n')) {
                        const newlineIndex = dataBuffer.indexOf('\n');
                        const jsonString = dataBuffer.substring(0, newlineIndex).trim();
                        dataBuffer = dataBuffer.substring(newlineIndex + 1);
                        
                        if (jsonString) {
                            try {
                                const data = JSON.parse(jsonString);
                                
                                // Update UI
                                if (data.temp !== undefined) tempEl.textContent = data.temp;
                                if (data.humidity !== undefined) humEl.textContent = data.humidity;
                                
                                // Update log
                                logEl.textContent = jsonString;
                            } catch (e) {
                                // Not valid JSON yet, ignore
                            }
                        }
                    }
                }
            } catch (err) {
                statusEl.textContent = "Connection failed: " + err.message;
            }
        });
    </script>
</body>
</html>
