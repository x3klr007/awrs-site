<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWRS — Aqua Well Robot Solution</title>
    <meta name="description"
        content="AWRS: Advanced autonomous well inspection & water sampling robot for the Geneva International Inventions Exhibition.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --accent: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.45);
            --surface: rgba(255, 255, 255, 0.04);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            --text-primary: #f5f5f7;
            --text-secondary: rgba(200, 215, 240, 0.55);
            --glass-bg: rgba(8, 12, 24, 0.75);
            --glass-border: rgba(100, 150, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #03060e;
            color: var(--text-primary);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* === Canvas === */
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* === Ambient Background Gradient === */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(30, 64, 175, 0.18) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(37, 99, 235, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse 50% 50% at 10% 60%, rgba(6, 95, 150, 0.07) 0%, transparent 50%);
        }

        /* === UI Overlay === */
        .ui-layer {
            position: fixed;
            z-index: 10;
            pointer-events: none;
            width: 100%;
            height: 100%;
        }

        /* === Header === */
        .header {
            position: absolute;
            top: 32px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: auto;
            opacity: 0;
            animation: fadeInDown 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 16px;
            backdrop-filter: blur(12px);
        }

        .header-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        .header h1 {
            font-size: clamp(32px, 5vw, 56px);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.1;
            background: linear-gradient(180deg, #e0eaff 0%, rgba(147, 197, 253, 0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: clamp(14px, 2vw, 18px);
            color: var(--text-secondary);
            font-weight: 400;
            margin-top: 8px;
            letter-spacing: -0.01em;
        }

        /* === Spec Menu (Left) === */
        .spec-menu {
            position: absolute;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: auto;
            opacity: 0;
            animation: fadeInLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
        }

        .spec-btn {
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 14px 20px;
            border-radius: 16px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 210px;
            text-align: left;
            overflow: hidden;
        }

        .spec-btn .btn-icon {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: rgba(59, 130, 246, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
            transition: all 0.35s ease;
        }

        .spec-btn:active {
            transform: scale(0.98);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
            background: rgba(59, 130, 246, 0.12);
        }

        .spec-btn:hover {
            background: var(--surface-hover);
            border-color: var(--border-hover);
            transform: translateX(4px);
        }

        .spec-btn:hover:active {
            transform: translateX(4px) scale(0.98);
        }

        .spec-btn:hover .btn-icon {
            background: rgba(59, 130, 246, 0.2);
        }

        .spec-btn.active {
            background: rgba(59, 130, 246, 0.12);
            border-color: rgba(59, 130, 246, 0.6);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15), inset 0 0 20px rgba(59, 130, 246, 0.05);
        }

        .spec-btn.active .btn-icon {
            background: rgba(59, 130, 246, 0.3);
        }

        .spec-btn .btn-label {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .spec-btn .btn-sub {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* === Info Panel (Right) === */
        .info-panel {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%) translateX(40px);
            width: 360px;
            background: var(--glass-bg);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 28px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .info-panel.visible {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
            pointer-events: auto;
        }

        .info-panel h2 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #bfdbfe 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .info-panel p {
            font-size: 14px;
            line-height: 1.65;
            color: rgba(255, 255, 255, 0.55);
            margin-bottom: 20px;
        }

        .spec-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 20px;
        }

        .spec-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.15);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            color: #93c5fd;
        }

        .spec-tag::before {
            content: '✦';
            font-size: 8px;
            opacity: 0.6;
        }

        .back-btn {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .back-btn:hover {
            background: var(--surface-hover);
            border-color: var(--border-hover);
        }

        /* === Bottom Bar === */
        .bottom-bar {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 24px;
            pointer-events: auto;
            opacity: 0;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.2s forwards;
        }

        .bottom-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .bottom-stat .stat-value {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #93c5fd 0%, #2563eb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .bottom-stat .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .stat-divider {
            width: 1px;
            height: 28px;
            background: var(--border);
        }

        /* === Hint === */
        .interaction-hint {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: rgba(255, 255, 255, 0.25);
            pointer-events: none;
            opacity: 0;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.6s forwards;
            white-space: nowrap;
        }

        /* === Loading Screen === */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #03060e;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-logo {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #1e40af 0%, #2563eb 50%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .loader-text {
            color: rgba(255, 255, 255, 0.3);
            font-size: 13px;
            font-weight: 400;
            margin-bottom: 24px;
        }

        .progress-track {
            width: 180px;
            height: 3px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #60a5fa);
            width: 0%;
            border-radius: 4px;
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .loader-error {
            color: rgba(239, 68, 68, 0.7);
            font-size: 11px;
            margin-top: 16px;
            opacity: 0;
            transition: opacity 0.3s;
            max-width: 280px;
            text-align: center;
            line-height: 1.5;
        }

        .loader-error.visible {
            opacity: 1;
        }

        /* === Animations === */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateY(-50%) translateX(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(-50%) translateX(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        /* === Responsive === */
        @media (max-width: 1100px) {
            .info-panel {
                width: 300px;
                right: 20px;
                padding: 22px;
            }

            .spec-menu {
                left: 20px;
            }
        }

        @media (max-width: 768px) {
            .header {
                top: 20px;
                width: 90%;
            }

            .header h1 {
                font-size: 28px;
            }

            .header p {
                font-size: 12px;
            }

            .spec-menu {
                position: absolute;
                left: 10px;
                right: 10px;
                top: auto;
                bottom: 100px;
                transform: none;
                flex-direction: row;
                flex-wrap: nowrap;
                overflow-x: auto;
                scroll-snap-type: x mandatory;
                justify-content: flex-start;
                padding: 10px 5px;
                gap: 8px;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
            }

            .spec-menu::-webkit-scrollbar {
                display: none;
            }

            .spec-btn {
                min-width: 160px;
                padding: 10px 12px;
                font-size: 12px;
                flex-shrink: 0;
                scroll-snap-align: start;
            }

            .spec-btn .btn-icon {
                width: 24px;
                height: 24px;
                font-size: 13px;
            }

            .spec-btn .btn-sub {
                display: none;
            }

            .info-panel {
                position: absolute;
                top: auto;
                bottom: 10px;
                left: 10px;
                right: 10px;
                width: calc(100% - 20px);
                transform: translateY(100%);
                max-height: 60vh;
                padding: 20px;
            }

            .info-panel.visible {
                transform: translateY(0);
            }

            .bottom-bar {
                bottom: 15px;
                gap: 12px;
                width: 95%;
                justify-content: center;
            }

            .bottom-stat .stat-value {
                font-size: 14px;
            }

            .bottom-stat .stat-label {
                font-size: 8px;
            }

            .interaction-hint {
                display: none;
            }

        }
    </style>
</head>

<body>

    <!-- Loading Screen -->
    <div class="loader" id="loader">
        <div class="loader-logo">AWRS</div>
        <div class="loader-text">Initializing 3D Model…</div>
        <div class="progress-track">
            <div class="progress-fill" id="progress"></div>
        </div>
        <div class="loader-error" id="loaderError"></div>
    </div>

    <!-- Ambient Background -->
    <div class="ambient-bg"></div>

    <!-- UI Overlay -->
    <div class="ui-layer">
        <!-- Header -->
        <div class="header">
            <div class="header-badge">Geneva Inventions Exhibition 2026</div>
            <h1>Aqua Well Robot</h1>
            <p>Autonomous Well Inspection & Water Sampling</p>
        </div>

        <!-- Left Menu -->
        <div class="spec-menu">
            <button class="spec-btn" data-part="Part7" data-name="Lower Motor">
                <span class="btn-icon">⚙</span>
                <span class="btn-label">
                    <span>Lower Motor Assembly</span>
                    <span class="btn-sub">Stabilization Base</span>
                </span>
            </button>
            <button class="spec-btn" data-part="Part1" data-name="Analytical Core">
                <span class="btn-icon">🔬</span>
                <span class="btn-label">
                    <span>Analytical Core</span>
                    <span class="btn-sub">XRF & Camera System</span>
                </span>
            </button>
            <button class="spec-btn" data-part="Part8" data-name="Upper Motor">
                <span class="btn-icon">🔧</span>
                <span class="btn-label">
                    <span>Upper Motor & Wheels</span>
                    <span class="btn-sub">Locomotion System</span>
                </span>
            </button>
            <button class="spec-btn" data-part="Part2" data-name="Sampling System">
                <span class="btn-icon">🧪</span>
                <span class="btn-label">
                    <span>Sampling Tubes</span>
                    <span class="btn-sub">Dual-Tube Collector</span>
                </span>
            </button>
        </div>

        <!-- Info Panel -->
        <div class="info-panel" id="infoPanel">
            <h2 id="partTitle">Component</h2>
            <div id="partContent">
                <p>Description loading…</p>
            </div>
            <div class="spec-tags" id="partSpecs"></div>
            <button class="back-btn" onclick="resetView()">
                <span>←</span> Back to Overview
            </button>
        </div>

        <!-- Bottom Stats -->
        <div class="bottom-bar">
            <div class="bottom-stat">
                <span class="stat-value">222mm</span>
                <span class="stat-label">Diameter</span>
            </div>
            <div class="stat-divider"></div>
            <div class="bottom-stat">
                <span class="stat-value">1.5L</span>
                <span class="stat-label">Sample Volume</span>
            </div>
            <div class="stat-divider"></div>
            <div class="bottom-stat">
                <span class="stat-value">360°</span>
                <span class="stat-label">Inspection</span>
            </div>
            <div class="stat-divider"></div>
            <div class="bottom-stat">
                <span class="stat-value">XRF</span>
                <span class="stat-label">Analysis</span>
            </div>
        </div>

        <!-- Interaction Hint -->
        <div class="interaction-hint">Drag to rotate · Scroll to zoom · Click a component to inspect</div>
    </div>

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>

    <!-- Three.js Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // ─────────────── Scene ───────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x03060e);
        scene.fog = new THREE.FogExp2(0x03060e, 0.0003);

        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 10000);
        camera.position.set(350, 80, 350);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.72;
        renderer.outputEncoding = THREE.sRGBEncoding;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // ─────────────── Controls ───────────────
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.minDistance = 80;
        controls.maxDistance = 800;
        controls.autoRotate = false;
        controls.rotateSpeed = 0.07;
        controls.enablePan = false;
        controls.maxPolarAngle = Math.PI * 0.85;
        controls.minPolarAngle = Math.PI * 0.15;

        // ─────────────── Lighting ───────────────
        // Ambient fill - very low, PBR relies on envMap
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.04);
        scene.add(ambientLight);

        // Key light (sharp specular highlight)
        const keyLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        keyLight.position.set(150, 300, 200);
        keyLight.castShadow = true;
        keyLight.shadow.mapSize.width = 2048;
        keyLight.shadow.mapSize.height = 2048;
        keyLight.shadow.camera.near = 10;
        keyLight.shadow.camera.far = 2000;
        keyLight.shadow.camera.left = -500;
        keyLight.shadow.camera.right = 500;
        keyLight.shadow.camera.top = 500;
        keyLight.shadow.camera.bottom = -500;
        keyLight.shadow.bias = -0.001;
        scene.add(keyLight);

        // Backlight for edge definition
        const backLightDir = new THREE.DirectionalLight(0x93c5fd, 0.7);
        backLightDir.position.set(-200, 100, -200);
        scene.add(backLightDir);

        // Subtle bottom uplighting
        const upLight = new THREE.PointLight(0x2563eb, 0.3, 800);
        upLight.position.set(0, -150, 0);
        scene.add(upLight);

        // ─────────────── Animated Water Surface ───────────────
        const waterSegments = 150;
        const waterSize = 3000;
        const waterGeometry = new THREE.PlaneGeometry(waterSize, waterSize, waterSegments, waterSegments);
        const waterMaterial = new THREE.MeshPhysicalMaterial({
            color: 0x0a3060,
            metalness: 0.5,
            roughness: 0.1,
            transparent: false,
            opacity: 1.0,
            clearcoat: 0.8,
            clearcoatRoughness: 0.05,
            envMapIntensity: 2.2,
            side: THREE.DoubleSide
        });
        const water = new THREE.Mesh(waterGeometry, waterMaterial);
        water.rotation.x = -Math.PI / 2;
        water.position.y = -250;
        water.receiveShadow = true;
        scene.add(water);

        // Store original water vertex positions for wave animation
        const waterPositions = waterGeometry.attributes.position.array.slice();

        // Caustic lights (simulate light filtering through water surface)
        const causticLight1 = new THREE.PointLight(0x1e40af, 0.4, 1200);
        causticLight1.position.set(0, 300, 0);
        scene.add(causticLight1);

        const causticLight2 = new THREE.PointLight(0x1d4ed8, 0.25, 800);
        causticLight2.position.set(200, 250, -150);
        scene.add(causticLight2);

        // ─────────────── Particles ───────────────
        const particleCount = 300;
        const particleGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const velocities = [];
        for (let i = 0; i < particleCount; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 1200;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 800;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 1200;
            velocities.push({
                x: (Math.random() - 0.5) * 0.15,
                y: (Math.random() - 0.5) * 0.1 + 0.05,
                z: (Math.random() - 0.5) * 0.15
            });
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({
            color: 0x3b82f6,
            size: 1.5,
            transparent: true,
            opacity: 0.3,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true
        });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        // ─────────────── Environment Map (for PBR reflections) ───────────────
        // We build a simulated "photo studio" skybox with glowing panels to create rich reflections.
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        pmremGenerator.compileEquirectangularShader();
        const envScene = new THREE.Scene();
        envScene.background = new THREE.Color(0x1a1a1a);

        // Studio Softboxes (these render into the environment map to provide bright reflections)
        const envPanelGeo = new THREE.PlaneGeometry(100, 100);

        // Main overhead softbox (neutral white — bright for hard specular)
        const topLight = new THREE.Mesh(envPanelGeo, new THREE.MeshBasicMaterial({ color: new THREE.Color(0xffffff).multiplyScalar(2.0) }));
        topLight.position.set(0, 100, 0);
        topLight.rotation.x = Math.PI / 2;
        envScene.add(topLight);

        // Side fill panel (cool blue tone — stronger for rim definition)
        const sideLight = new THREE.Mesh(envPanelGeo, new THREE.MeshBasicMaterial({ color: new THREE.Color(0x93c5fd).multiplyScalar(1.0) }));
        sideLight.position.set(-100, 20, -50);
        sideLight.lookAt(0, 0, 0);
        envScene.add(sideLight);

        // Back edge panel (warm tone — for edge highlights)
        const backLight = new THREE.Mesh(envPanelGeo, new THREE.MeshBasicMaterial({ color: new THREE.Color(0xfff5e6).multiplyScalar(0.6) }));
        backLight.position.set(80, 40, -100);
        backLight.lookAt(0, 0, 0);
        envScene.add(backLight);

        // Additional contrast panel (dark floor to ground reflections)
        const floorPanel = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({ color: new THREE.Color(0x000000) }));
        floorPanel.position.set(0, -100, 0);
        floorPanel.rotation.x = -Math.PI / 2;
        envScene.add(floorPanel);

        scene.environment = pmremGenerator.fromScene(envScene).texture;

        // ─────────────── Materials (PBR Brushed Steel) ───────────────
        const pbrBase = {
            metalness: 0.6,
            roughness: 0.32,
            clearcoat: 0.25,
            clearcoatRoughness: 0.3,
            envMapIntensity: 1.4,
            transparent: false,
            opacity: 1.0,
            depthWrite: true
        };

        const materials = {
            mainBody: new THREE.MeshPhysicalMaterial({
                ...pbrBase,
                color: 0x1845a8
            }),
            motorHousing: new THREE.MeshPhysicalMaterial({
                ...pbrBase,
                color: 0x143898,
                metalness: 0.65,
                roughness: 0.28
            }),
            rubber: new THREE.MeshPhysicalMaterial({
                color: 0x161f30,
                metalness: 0.25,
                roughness: 0.75,
                clearcoat: 0.05,
                envMapIntensity: 1.0,
                transparent: false,
                opacity: 1.0,
                depthWrite: true
            }),
            sensor: new THREE.MeshPhysicalMaterial({
                color: 0xcc2222,
                metalness: 0.6,
                roughness: 0.2,
                clearcoat: 0.12,
                envMapIntensity: 1.5,
                transparent: false,
                opacity: 1.0,
                depthWrite: true
            }),
            chrome: new THREE.MeshPhysicalMaterial({
                color: 0x7a8da8,
                metalness: 0.65,
                roughness: 0.2,
                clearcoat: 0.4,
                clearcoatRoughness: 0.15,
                envMapIntensity: 2.0,
                transparent: false,
                opacity: 1.0,
                depthWrite: true
            })
        };

        // ─────────────── Part Information ───────────────
        const partInfo = {
            'Part7': {
                title: "Lower Motor Assembly",
                description: "The foundation of AWRS featuring hydraulic wheel extensions that stabilize against well walls. Includes a protective door-like system that seals the analytical components during descent and ascent. Thick rubber pads prevent slipping on wet surfaces.",
                specs: ["222mm Diameter", "Hydraulic Stabilization", "Protective Sealing Door", "Anti-slip Rubber"]
            },
            'Part1': {
                title: "Analytical Core",
                description: "The central intelligence unit containing XRF sensors for metal integrity analysis, high-definition cameras for 360° visual inspection, and laser thickness measurement systems. Rotating sections allow complete well pipe assessment.",
                specs: ["XRF Metal Analysis", "360° HD Camera", "Laser Thickness Beam", "Corrosion Detection"]
            },
            'Part8': {
                title: "Upper Motor & Wheels",
                description: "Primary locomotion system with hydraulically operated wheels that extend to grip pipe walls. Features dynamic handle attachment for operator retrieval and steel rope safety connection to prevent free-fall scenarios.",
                specs: ["Hydraulic Wheel Extensions", "Steel Safety Rope", "Dynamic Handle", "Weight Balance System"]
            },
            'Part2': {
                title: "Sampling System",
                description: "Dual-tube hydraulic sampling mechanism with 500ml surface sampler and 1L deep-water collector. Metal ball seals automatically close tubes when filled. Water level detection probe prevents over-sampling.",
                specs: ["500ml + 1L Tubes", "Hydraulic Extension", "Auto-sealing Mechanism", "Water Level Detection"]
            }
        };



        // ─────────────── Load STL Files ───────────────
        const loader = new THREE.STLLoader();
        const loadedParts = {};
        const partsGroup = new THREE.Group();
        scene.add(partsGroup);
        // Much larger scale — model fills the viewport
        partsGroup.scale.set(1.0, 1.0, 1.0);

        // Part10.stl not in directory — removed from list
        const filesToLoad = ['Part1.stl', 'Part2.stl', 'Part4.stl', 'Part7.stl', 'Part8.stl'];
        let loadedCount = 0;
        let loadErrors = [];

        function updateProgress() {
            loadedCount++;
            const percent = (loadedCount / filesToLoad.length) * 100;
            document.getElementById('progress').style.width = percent + '%';

            if (loadedCount === filesToLoad.length) {
                setTimeout(() => {
                    document.getElementById('loader').classList.add('hidden');
                    if (loadErrors.length > 0 && loadedCount === loadErrors.length) {
                        const errEl = document.getElementById('loaderError');
                        errEl.textContent = 'Some models failed to load. Try serving via HTTP server.';
                        errEl.classList.add('visible');
                    }
                }, 600);
            }
        }

        function getMaterialForPart(filename) {
            if (filename.includes('Part8')) return materials.motorHousing;
            if (filename.includes('Part1') || filename.includes('Part4')) return materials.mainBody;
            if (filename.includes('Part7')) return materials.rubber;
            if (filename.includes('Part2')) return materials.chrome;
            return materials.mainBody;
        }

        filesToLoad.forEach(file => {
            loader.load(file, (geometry) => {
                const material = getMaterialForPart(file);
                const mesh = new THREE.Mesh(geometry, material.clone());
                mesh.castShadow = true;
                mesh.receiveShadow = true;

                const key = file.replace('.stl', '');

                // Rotation to stand upright
                if (key !== 'Part2') {
                    geometry.rotateX(-Math.PI / 2);
                }
                // Part7 (plain cap) at BOTTOM — flip so it faces correctly
                if (key === 'Part7') {
                    geometry.rotateX(Math.PI);
                }
                // Part8 (hook cap) at TOP — no extra flip needed
                if (key === 'Part4') {
                    geometry.rotateY(Math.PI);
                }

                // Center geometry
                geometry.computeBoundingBox();
                const box = geometry.boundingBox;
                const cx = (box.min.x + box.max.x) / 2;
                const cy = (box.min.y + box.max.y) / 2;
                const cz = (box.min.z + box.max.z) / 2;
                geometry.translate(-cx, -cy, -cz);

                loadedParts[key] = mesh;

                // Stacking positions (bottom up)
                // SWAPPED: Part7 (plain cone) at bottom, Part8 (hook) at top
                const baseAnchor = -200;
                const yBottom = baseAnchor;                    // Part7 (plain cone) → bottom
                const yCage = yBottom + 41.2 + 149;           // Part1/Part4 cage → middle
                const yTop = yCage + 149 + 41.6;              // Part8 (hook cap) → top

                const positions = {
                    'Part7': yBottom,
                    'Part1': yCage,
                    'Part4': yCage,
                    'Part8': yTop,
                    'Part2': yCage
                };

                mesh.position.y = positions[key] || 0;

                if (key === 'Part1') mesh.position.z = 38.71;
                if (key === 'Part4') mesh.position.z = -38.71;

                partsGroup.add(mesh);
                updateProgress();

                // After all parts loaded, add glass cylinder and auto-center
                if (loadedCount === filesToLoad.length - loadErrors.length) {
                    // ─── Glass fill for cage windows ───
                    const baseAnchorGlass = -200;
                    const yCageGlass = baseAnchorGlass + 41.2 + 149; // -9.8
                    // Barrel-curved profile to match cage body shape
                    const halfH = 130;  // half-height of fill
                    const barrelPoints = [];
                    const segments = 24;
                    for (let i = 0; i <= segments; i++) {
                        const t = i / segments;           // 0 → 1 (bottom → top)
                        const y = -halfH + t * halfH * 2; // -130 → +130
                        // Barrel curve: widest at center, narrower at ends
                        const curve = 1 - Math.pow((t - 0.5) * 2, 2); // 0 at ends, 1 at center
                        const r = 56 + curve * 12;        // 56 at edges → 68 at center
                        barrelPoints.push(new THREE.Vector2(r, y));
                    }
                    const glassGeo = new THREE.LatheGeometry(barrelPoints, 32);
                    const glassMat = new THREE.MeshPhysicalMaterial({
                        color: 0x010103,
                        metalness: 0.05,
                        roughness: 0.8,
                        transparent: false,
                        opacity: 1.0,
                        clearcoat: 0.2,
                        clearcoatRoughness: 0.3,
                        side: THREE.DoubleSide
                    });
                    const glassMesh = new THREE.Mesh(glassGeo, glassMat);
                    glassMesh.position.y = yCageGlass;
                    glassMesh.renderOrder = -1;  // render behind cage bars
                    glassMesh.receiveShadow = false;
                    glassMesh.castShadow = false;
                    partsGroup.add(glassMesh);
                    window._glassMesh = glassMesh; // Save reference for ghosting

                    autoCenterModel();
                }
            }, undefined, (error) => {
                console.warn('Failed to load', file, error);
                loadErrors.push(file);
                updateProgress();
            });
        });

        // Auto-center model and compute dynamic camera views
        function autoCenterModel() {
            const bbox = new THREE.Box3().setFromObject(partsGroup);
            const center = bbox.getCenter(new THREE.Vector3());
            const size = bbox.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const fitDist = maxDim * 1.8;

            // Set orbit target to model center
            controls.target.copy(center);
            camera.position.set(center.x + fitDist * 0.55, center.y + fitDist * 0.1, center.z + fitDist * 0.55);
            controls.update();

            // Move ground to model bottom
            water.position.y = bbox.min.y - 5;


        }

        // Fallback: dismiss loader after timeout even if loads fail
        setTimeout(() => {
            document.getElementById('loader').classList.add('hidden');
            if (Object.keys(loadedParts).length === 0) {
                const errEl = document.getElementById('loaderError');
                errEl.textContent = 'Models could not be loaded. Serve this page via an HTTP server (python3 -m http.server).';
                errEl.classList.add('visible');
            }
        }, 8000);

        // ─────────────── Animation Loop ───────────────
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsed = clock.getElapsedTime();

            controls.update();

            // ── Animate water surface waves (multi-octave for realism) ──
            const wPos = waterGeometry.attributes.position.array;
            for (let i = 0; i < wPos.length; i += 3) {
                const ox = waterPositions[i];
                const oy = waterPositions[i + 1];
                // Large slow swells
                const swell1 = Math.sin(ox * 0.003 + elapsed * 0.4) * 6;
                const swell2 = Math.sin(oy * 0.004 + elapsed * 0.3) * 5;
                // Medium waves
                const wave1 = Math.sin(ox * 0.009 + elapsed * 0.9) * 2.5;
                const wave2 = Math.cos(oy * 0.007 + elapsed * 0.7) * 2;
                const wave3 = Math.sin((ox + oy) * 0.011 + elapsed * 1.1) * 1.5;
                // Small ripples
                const ripple1 = Math.sin(ox * 0.025 + elapsed * 1.8) * 0.6;
                const ripple2 = Math.cos(oy * 0.03 - elapsed * 2.0) * 0.4;
                wPos[i + 2] = waterPositions[i + 2] + swell1 + swell2 + wave1 + wave2 + wave3 + ripple1 + ripple2;
            }
            waterGeometry.attributes.position.needsUpdate = true;
            waterGeometry.computeVertexNormals();

            // Animate particles
            const pos = particles.geometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                pos[i * 3] += velocities[i].x;
                pos[i * 3 + 1] += velocities[i].y;
                pos[i * 3 + 2] += velocities[i].z;
                if (pos[i * 3 + 1] > 400) pos[i * 3 + 1] = -400;
                if (Math.abs(pos[i * 3]) > 600) pos[i * 3] *= -0.9;
                if (Math.abs(pos[i * 3 + 2]) > 600) pos[i * 3 + 2] *= -0.9;
            }
            particles.geometry.attributes.position.needsUpdate = true;

            // Animate caustic lights (orbit + pulse)
            causticLight1.position.x = Math.sin(elapsed * 0.3) * 250;
            causticLight1.position.z = Math.cos(elapsed * 0.4) * 200;
            causticLight1.intensity = 0.4 + Math.sin(elapsed * 1.1) * 0.2;

            causticLight2.position.x = Math.cos(elapsed * 0.25) * 200;
            causticLight2.position.z = Math.sin(elapsed * 0.35) * 250;
            causticLight2.intensity = 0.25 + Math.cos(elapsed * 0.8) * 0.12;

            // Underwater uplight pulse
            upLight.intensity = 0.4 + Math.sin(elapsed * 0.6) * 0.12;

            renderer.render(scene, camera);
        }
        animate();

        // ─────────────── UI Interactions ───────────────
        let currentView = null;

        document.querySelectorAll('.spec-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const partName = btn.dataset.part;
                focusOnPart(partName, btn);
            });
        });

        function focusOnPart(partName, btnElement) {
            currentView = partName;
            controls.autoRotate = false;

            // Update buttons
            document.querySelectorAll('.spec-btn').forEach(b => b.classList.remove('active'));
            if (btnElement) btnElement.classList.add('active');

            // Show info panel for all parts, dashboard is removed
            const info = partInfo[partName];
            if (info) {
                document.getElementById('partTitle').textContent = info.title;
                document.getElementById('partContent').innerHTML = `<p>${info.description}</p>`;
                document.getElementById('partSpecs').innerHTML = info.specs
                    .map(spec => `<span class="spec-tag">${spec}</span>`)
                    .join('');
                document.getElementById('infoPanel').classList.add('visible');
            }

            // Highlighting effect: Emissive glow on selected part, keep others solid
            Object.entries(loadedParts).forEach(([key, mesh]) => {
                // Ensure everything stays solid
                mesh.material.transparent = false;
                mesh.material.depthWrite = true;
                mesh.material.wireframe = false;
                mesh.material.opacity = 1.0;

                if (key === partName) {
                    // Highlight selected
                    mesh.material.emissive = new THREE.Color(0x3b82f6);
                    gsap.to(mesh.material, { emissiveIntensity: 0.15, duration: 0.4, ease: "power2.inOut" });
                } else {
                    // Remove highlight from unselected
                    gsap.to(mesh.material, { emissiveIntensity: 0, duration: 0.4, ease: "power2.inOut", onComplete: () => { mesh.material.emissive = new THREE.Color(0x000000); } });
                }
            });

            // Keep glass core solid
            if (window._glassMesh) {
                window._glassMesh.material.transparent = false;
                window._glassMesh.material.depthWrite = true;
                window._glassMesh.material.wireframe = false;
                window._glassMesh.material.opacity = 1.0;
            }
        }

        window.resetView = function () {
            currentView = null;
            controls.autoRotate = false;

            document.querySelectorAll('.spec-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('infoPanel').classList.remove('visible');

            // Reset all materials to solid, no emission
            Object.values(loadedParts).forEach(mesh => {
                mesh.material.transparent = false;
                mesh.material.depthWrite = true;
                mesh.material.wireframe = false;
                mesh.material.opacity = 1.0;
                gsap.to(mesh.material, {
                    emissiveIntensity: 0,
                    duration: 0.5,
                    ease: "power2.inOut",
                    onComplete: () => { mesh.material.emissive = new THREE.Color(0x000000); }
                });
            });

            if (window._glassMesh) {
                window._glassMesh.material.transparent = false;
                window._glassMesh.material.depthWrite = true;
                window._glassMesh.material.wireframe = false;
                window._glassMesh.material.opacity = 1.0;
            }
        };

        // ─────────────── Raycasting (Click 3D) ───────────────
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            if (event.target.closest('.ui-layer')) return;
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(partsGroup.children);
            if (intersects.length > 0) {
                const clicked = intersects[0].object;
                const partName = Object.keys(loadedParts).find(k => loadedParts[k] === clicked);
                if (partName && partInfo[partName]) {
                    const btn = document.querySelector(`[data-part="${partName}"]`);
                    focusOnPart(partName, btn);
                }
            }
        });

        // ─────────────── Keyboard Navigation ───────────────
        const partKeys = Object.keys(partInfo);
        let currentIndex = -1;

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                resetView();
                currentIndex = -1;
            } else if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                e.preventDefault();
                currentIndex = (currentIndex + 1) % partKeys.length;
                const part = partKeys[currentIndex];
                const btn = document.querySelector(`[data-part="${part}"]`);
                focusOnPart(part, btn);
            } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                e.preventDefault();
                currentIndex = currentIndex <= 0 ? partKeys.length - 1 : currentIndex - 1;
                const part = partKeys[currentIndex];
                const btn = document.querySelector(`[data-part="${part}"]`);
                focusOnPart(part, btn);
            }
        });

        // ─────────────── Resize ───────────────
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>

</html>
